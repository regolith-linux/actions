name: Test Runners

on:
  push:
    branches-ignore:
      - main

jobs:
  matrix-builder:
    runs-on: regolith-runner-set
    outputs:
      includes: ${{ steps.builder.outputs.includes }}
    # outputs:
    #   stages: ${{ steps.builder.outputs.stages }}
    #   distros: ${{ steps.builder.outputs.distros }}
    #   codenames: ${{ steps.builder.outputs.codenames }}
    #   arches: ${{ steps.builder.outputs.arches }}
    #   suites: ${{ steps.builder.outputs.suites }}
    #   runners: ${{ steps.builder.outputs.runners }}
    #   includes: ${{ steps.builder.outputs.includes }}
    #   excludes: ${{ steps.builder.outputs.excludes }}
    steps:
      - name: Calculate Matrix
        id: builder
        run: |
          INCLUDES=()

          INCLUDES+=($(jq -n -c --arg distro "debian" --arg codename "bookworm" --arg arch "amd64" '$ARGS.named'))
          INCLUDES+=($(jq -n -c --arg distro "debian" --arg codename "testing" --arg arch "amd64" '$ARGS.named'))
          INCLUDES+=($(jq -n -c --arg distro "ubuntu" --arg codename "jammy" --arg arch "amd64" '$ARGS.named'))
          INCLUDES+=($(jq -n -c --arg distro "ubuntu" --arg codename "noble" --arg arch "amd64" '$ARGS.named'))
          INCLUDES+=($(jq -n -c --arg distro "ubuntu" --arg codename "oracular" --arg arch "amd64" '$ARGS.named'))

          echo "includes=$(jq -n -c "[$(printf '%s\n' "${INCLUDES[@]}" | paste -sd,)]" '$ARGS.named')" >> $GITHUB_OUTPUT

