  build:
    runs-on: ["regolith-${{ matrix.arch }}"]
    # runs-on: ubuntu-24.04
    # runs-on: [self-hosted, Linux, "${{ matrix.arch }}", noble] 
    needs: matrix-builder
    container: "ghcr.io/regolith-linux/ci-${{ matrix.distro }}:${{ matrix.codename }}-${{ matrix.arch }}"
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.matrix-builder.outputs.includes) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: |
          echo "Building ${{ matrix.distro }}/${{ matrix.codename }} (arch=${{ matrix.arch }})"
          uname -a
          cat /etc/*-release

