name: Test Runners

on:
  push:
    branches-ignore:
      - main

jobs:
  matrix-builder:
    runs-on: regolith-amd64
    # container: "ghcr.io/regolith-linux/ci-ubuntu:noble-amd64"
    outputs:
      includes: ${{ steps.builder.outputs.includes }}
    steps:
      - name: Build Matrix
        id: builder
        uses: regolith-linux/actions/build-matrix@main
        with:
          name: "${{ github.event.repository.name }}"
          ref: "main"
          arch: "amd64"
          stage: "unstable"

